services:
  - type: web
    name: finsight-ocr-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Make sure to add these remaining env vars in the Render Dashboard after connecting your repo:
      # - SUPABASE_URL
      # - SUPABASE_KEY
      # - GEMINI_API_KEY
